<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>우당탕탕삼국지</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%2318191f'/%3E%3Cpath d='M16 46L28 18l8 18 6-12 6 22' fill='none' stroke='%23d8b36a' stroke-width='6' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;900&family=Noto+Serif+KR:wght@700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      overflow: hidden;
      height: 100dvh;
      width: 100vw;
    }
    #game {
      position: relative;
      z-index: 1;
      width: 100vw;
      height: 100dvh;
    }
    /* Leaflet map behind Phaser canvas — lives outside #game */
    #leaflet-map {
      background: #0a0a0f;
    }
    #leaflet-map .leaflet-tile-pane {
      will-change: transform;
    }
    /* Prevent Leaflet internals from stealing pointer events */
    #leaflet-map * {
      pointer-events: none !important;
    }
    /* Hide Leaflet attribution */
    .leaflet-control-attribution { display: none !important; }
  </style>
</head>
<body>
  <div id="game"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
