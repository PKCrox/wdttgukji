<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>왜 다 턴 가지구</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;900&family=Noto+Serif+KR:wght@700;900&display=swap" rel="stylesheet">
</head>
<body>
  <!-- 시작 화면 -->
  <div id="start-screen">
    <div class="start-content">
      <h1 class="game-title">왜 다 턴 가지구</h1>
      <p class="game-subtitle">삼국지 에이전틱 시뮬레이션</p>
      <div class="scenario-list">
        <button class="scenario-btn active" data-scenario="208">
          <span class="scenario-year">208</span>
          <span class="scenario-name">적벽대전</span>
          <span class="scenario-desc">조조 80만 남하, 손유 연합의 운명적 결전</span>
        </button>
        <button class="scenario-btn disabled" disabled>
          <span class="scenario-year">190</span>
          <span class="scenario-name">반동탁 연합</span>
          <span class="scenario-desc">준비 중</span>
        </button>
        <button class="scenario-btn disabled" disabled>
          <span class="scenario-year">200</span>
          <span class="scenario-name">관도대전</span>
          <span class="scenario-desc">준비 중</span>
        </button>
        <button class="scenario-btn disabled" disabled>
          <span class="scenario-year">220</span>
          <span class="scenario-name">삼국 정립</span>
          <span class="scenario-desc">준비 중</span>
        </button>
      </div>
      <div class="start-actions">
        <button id="btn-new-game" class="btn-primary">새 게임</button>
        <button id="btn-load-game" class="btn-secondary">이어하기</button>
      </div>
    </div>
  </div>

  <!-- 세력 선택 화면 -->
  <div id="faction-screen" class="hidden">
    <canvas id="faction-map"></canvas>
    <div class="faction-select-overlay">
      <div class="faction-select-content">
        <h2 class="faction-select-title">세력을 선택하세요</h2>
        <p class="faction-select-sub">208년 적벽대전 — 당신은 누구의 편에 서겠습니까?</p>
        <div class="faction-cards" id="faction-cards"></div>
        <div class="faction-select-actions">
          <button id="btn-confirm-faction" class="btn-primary" disabled>시작</button>
          <button id="btn-back-to-start" class="btn-secondary">뒤로</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 도입 스토리 -->
  <div id="intro-screen" class="hidden">
    <div class="intro-content">
      <div class="intro-year">208년</div>
      <h2 id="intro-title" class="intro-title"></h2>
      <div id="intro-narrative" class="intro-narrative"></div>
      <div id="intro-dialogue" class="intro-dialogue hidden">
        <div class="dialogue-box">
          <div class="dialogue-speaker" id="dialogue-speaker"></div>
          <div class="dialogue-text" id="dialogue-text"></div>
          <div class="dialogue-advance">▼ 클릭하여 계속</div>
        </div>
        <div class="dialogue-progress" id="dialogue-progress"></div>
      </div>
      <div class="intro-stats" id="intro-stats"></div>
      <button id="btn-start-game" class="btn-primary hidden">천하에 나서다</button>
    </div>
  </div>

  <!-- 게임 화면 -->
  <div id="game-screen" class="hidden">
    <!-- 상단 바 -->
    <header id="top-bar">
      <div class="turn-info">
        <span id="year-display">208년</span>
        <span id="month-display">1월</span>
        <span id="turn-display">턴 1</span>
      </div>
      <div class="player-info">
        <span id="faction-name">촉</span>
        <span id="gold-display">금: 12,000</span>
        <span id="army-display">총 병력: 0</span>
        <span id="actions-display">행동: 3/3</span>
        <span id="rep-display">평판: 100</span>
      </div>
      <div class="top-actions">
        <button id="btn-next-turn" class="btn-turn">다음 턴</button>
        <button id="btn-toggle-log" class="btn-small" title="턴 기록">기록</button>
        <button id="btn-save" class="btn-small">저장</button>
        <button id="btn-menu" class="btn-small">메뉴</button>
      </div>
    </header>

    <!-- 메인 영역 -->
    <div id="main-area">
      <!-- 맵 캔버스 -->
      <div id="map-container">
        <canvas id="game-map" width="900" height="680"></canvas>
      </div>

      <!-- 우측 사이드바 -->
      <aside id="sidebar">
        <div id="sidebar-content">
          <div class="sidebar-section" id="city-info">
            <h3>도시를 선택하세요</h3>
            <p class="hint">맵에서 도시를 클릭하면 상세 정보가 표시됩니다</p>
          </div>
          <div class="sidebar-section" id="faction-summary">
            <h3>세력 현황</h3>
            <div id="faction-list"></div>
          </div>
        </div>
      </aside>
    </div>

    <!-- 행동 패널 (탭 바 하단 고정 + 콘텐츠 위로) -->
    <div id="action-panel" class="hidden">
      <div id="action-panel-content">
        <div id="action-panel-header">
          <span id="action-panel-title">도시 행동</span>
          <button id="action-panel-close">&times;</button>
        </div>
        <div id="action-buttons"></div>
      </div>
      <div id="action-tab-bar"></div>
    </div>

    <!-- 턴 로그 -->
    <div id="turn-log" class="hidden">
      <div id="turn-log-header">
        <h3>턴 기록</h3>
        <button id="btn-close-log">&times;</button>
      </div>
      <div id="turn-log-content"></div>
    </div>
  </div>

  <!-- 턴 결산 프로그레스 바 (상단 바 바로 아래) -->
  <div id="tr-progress-bar" class="hidden"><div id="tr-progress-fill"></div></div>

  <!-- 턴 결산 로그 패널 (좌하단, 맵 위에 떠있음) -->
  <div id="turn-resolution" class="hidden">
    <div class="tr-header">
      <span id="tr-phase-label" class="tr-phase"></span>
      <span id="tr-counter" class="tr-counter">0 / 0</span>
      <button id="tr-skip" class="btn-small">건너뛰기</button>
    </div>
    <div id="tr-items" class="tr-items"></div>
    <div class="tr-hint">클릭/Space 빠르게 · ESC 건너뛰기</div>
  </div>

  <!-- 이벤트 모달 -->
  <div id="event-modal" class="hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <h2 id="event-title"></h2>
      <p id="event-narrative"></p>
      <p id="event-flavor" class="flavor"></p>
      <div id="event-choices"></div>
      <button id="event-continue" class="btn-primary hidden">계속</button>
    </div>
  </div>

  <!-- 캐릭터 상세 모달 -->
  <div id="char-modal" class="hidden">
    <div class="modal-backdrop" id="char-modal-backdrop"></div>
    <div class="modal-content char-detail-modal" id="char-modal-content"></div>
  </div>

  <!-- 게임오버 모달 -->
  <div id="gameover-modal" class="hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-content gameover">
      <h2 id="gameover-title"></h2>
      <p id="gameover-message"></p>
      <div class="gameover-stats" id="gameover-stats"></div>
      <button id="btn-restart" class="btn-primary">처음으로</button>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
